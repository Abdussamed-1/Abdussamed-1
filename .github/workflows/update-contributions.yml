name: Update contributions in README

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write

concurrency:
  group: update-contributions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch last 12 months contributions
        id: contrib
        uses: actions/github-script@v7
        with:
          script: |
            const login = context.repo.owner;
            const query = `
              query($login: String!) {
                user(login: $login) {
                  contributionsCollection {
                    contributionCalendar {
                      totalContributions
                    }
                  }
                }
              }
            `;

            const data = await github.graphql(query, { login });
            const total = data?.user?.contributionsCollection?.contributionCalendar?.totalContributions;
            if (typeof total !== "number") throw new Error("Could not read totalContributions");
            core.setOutput("last_year", String(total));

      - name: Update README placeholder
        run: node scripts/update-readme-contrib.mjs
        env:
          LAST_YEAR_CONTRIB: ${{ steps.contrib.outputs.last_year }}

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update contributions count"
          git push
